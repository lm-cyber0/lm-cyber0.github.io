<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>{{ if .IsHome }}Lev Malinin - Security Engineer{{ else }}{{ .Title }} | Lev Malinin{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}Security engineer specializing in vulnerability management, cloud security, and Python automation.{{ end }}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ if .IsHome }}Lev Malinin - Security Engineer{{ else }}{{ .Title }} | Lev Malinin{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}Security engineer specializing in vulnerability management, cloud security, and Python automation.{{ end }}">
  <meta property="og:image" content="{{ "og-image.png" | absURL }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ if .IsHome }}Lev Malinin - Security Engineer{{ else }}{{ .Title }} | Lev Malinin{{ end }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}Security engineer specializing in vulnerability management, cloud security, and Python automation.{{ end }}">
  <link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
  {{ block "head" . }}{{ end }}
</head>
<body>
  {{ block "body" . }}{{ end }}
  <script src="{{ "js/main.js" | relURL }}"></script>
  {{ block "scripts" . }}{{ end }}
</body>
</html>
